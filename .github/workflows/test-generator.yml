name: Test Generator Script

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  test:
    name: Generate & Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          check-latest: true

      - name: Configure git identity
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test Runner"

      - name: Run generator script with automated inputs
        run: |
          printf 'TestApp\ncom.example.testapp\n./test-app\n24\n\n\n#FFFFFF\nY\n' | bash create-android-app.sh

      - name: Detect compileSdk from generated project
        id: detect-sdk
        run: |
          COMPILE_SDK=$(grep -oP 'compileSdk\s*=\s*\K\d+' test-app/app/build.gradle.kts)
          echo "compileSdk=${COMPILE_SDK}" >> "$GITHUB_OUTPUT"

      - name: Install Android SDK platform and build-tools
        env:
          SDK: ${{ steps.detect-sdk.outputs.compileSdk }}
        run: |
          SDKMAN="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          # If the expected platform directory exists, use it directly
          if [ -d "$ANDROID_SDK_ROOT/platforms/android-${SDK}" ]; then
            echo "android-${SDK} already installed"
            echo "SDK_INSTALLED=$SDK" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "android-${SDK} not pre-installed, trying to install via SDK manager..."
          if yes | "$SDKMAN" "platforms;android-${SDK}" 2>&1; then
            echo "SDK_INSTALLED=$SDK" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "android-${SDK} not available, trying fallback platforms..."
          for FALLBACK in 36 35 34; do
            if [ -d "$ANDROID_SDK_ROOT/platforms/android-${FALLBACK}" ]; then
              echo "android-${FALLBACK} already installed, using it"
              echo "SDK_INSTALLED=${FALLBACK}" >> "$GITHUB_ENV"
              sed -i -E "s/compileSdk\s*=\s*[0-9]+/compileSdk = ${FALLBACK}/" test-app/app/build.gradle.kts
              sed -i -E "s/targetSdk\s*=\s*[0-9]+/targetSdk = ${FALLBACK}/" test-app/app/build.gradle.kts
              exit 0
            fi
          done
          echo "ERROR: No Android SDK platform could be installed!"
          exit 1

      - name: Verify and fix gradle wrapper
        working-directory: ./test-app
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing, downloading..."
            GRADLE_VER=$(grep -oP 'distributionUrl=.*gradle-\K[^-]+(?=-bin.zip)' gradle/wrapper/gradle-wrapper.properties)
            curl -sL "https://github.com/gradle/gradle/raw/v${GRADLE_VER}/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar || {
              echo "Download from gradle repo failed, extracting from full Gradle distribution..."
              curl -sL "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" -o /tmp/gradle.zip
              mkdir -p /tmp/gradle-extract
              unzip -q -o /tmp/gradle.zip -d /tmp/gradle-extract
              find /tmp/gradle-extract -name "gradle-wrapper*.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \; 2>/dev/null || true
            }
          fi
          chmod +x gradlew

      - name: Show Android SDK state
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "--- Platforms ---"
          ls "$ANDROID_SDK_ROOT/platforms/" 2>/dev/null || echo "none"
          echo "--- Build-tools ---"
          ls "$ANDROID_SDK_ROOT/build-tools/" 2>/dev/null || echo "none"
          echo "--- Cmdline-tools ---"
          ls "$ANDROID_SDK_ROOT/cmdline-tools/" 2>/dev/null || echo "none"

      - name: Disable configuration cache in generated project
        run: |
          sed -i 's/org.gradle.configuration-cache=true/org.gradle.configuration-cache=false/' test-app/gradle.properties

      - name: Build generated project (assembleDebug)
        working-directory: ./test-app
        run: |
          ./gradlew assembleDebug --no-daemon --no-configuration-cache 2>&1 | tee /tmp/build-output.log

      - name: Upload build output and reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            /tmp/build-output.log
            test-app/app/build/reports/
            test-app/app/build/outputs/
          retention-days: 3
