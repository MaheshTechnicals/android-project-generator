name: Test Generator Script

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  test:
    name: Generate & Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          check-latest: true

      - name: Configure git identity
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test Runner"

      - name: Run generator script with automated inputs
        run: |
          printf 'TestApp\ncom.example.testapp\n./test-app\n24\n\n\n#FFFFFF\nY\n' | bash create-android-app.sh

      - name: Detect compileSdk from generated project
        id: detect-sdk
        run: |
          COMPILE_SDK=$(grep -oP 'compileSdk\s*=\s*\K\d+' test-app/app/build.gradle.kts)
          echo "compileSdk=${COMPILE_SDK}" >> "$GITHUB_OUTPUT"

      - name: Install Android SDK platform
        env:
          SDK: ${{ steps.detect-sdk.outputs.compileSdk }}
        run: |
          SDKMAN="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if yes | "$SDKMAN" "platforms;android-${SDK}" 2>&1; then
            echo "SDK_INSTALLED=$SDK" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "android-${SDK} not available, trying fallback platforms..."
          for FALLBACK in 36 35 34 33; do
            if yes | "$SDKMAN" "platforms;android-${FALLBACK}" 2>&1; then
              echo "SDK_INSTALLED=$FALLBACK" >> "$GITHUB_ENV"
              sed -i -E "s/compileSdk\s*=\s*[0-9]+/compileSdk = ${FALLBACK}/" test-app/app/build.gradle.kts
              sed -i -E "s/targetSdk\s*=\s*[0-9]+/targetSdk = ${FALLBACK}/" test-app/app/build.gradle.kts
              exit 0
            fi
          done
          echo "ERROR: No Android SDK platform could be installed!"
          exit 1

      - name: Build generated project (assembleDebug)
        working-directory: ./test-app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload build reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: test-app/app/build/reports/
          retention-days: 3
